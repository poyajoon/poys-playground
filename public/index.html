<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Translation Playground</title>
  </head>
  <body>
    <h1>Translation Playground</h1>

    <form id="translate-form">
      <label>
        Text
        <textarea id="text" required></textarea>
      </label>
      <br />
      <label>
        Målspråk
        <input id="targetLang" type="text" placeholder="t.ex. en" required />
      </label>
      <br />
      <button type="submit">Översätt</button>
    </form>

    <h2>Resultat</h2>
    <pre id="result"></pre>

    <script src="/app.js"></script>
  </body>
</html>
