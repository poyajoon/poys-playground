<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Translation Playground</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 900px;
        margin: 2rem auto;
        padding: 0 1rem;
      }

      .fields {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 1rem;
      }

      textarea {
        width: 100%;
        min-height: 140px;
      }

      #status {
        margin-top: 1rem;
        min-height: 1.4rem;
      }
    </style>
  </head>
  <body>
    <h1>Translation Playground</h1>

    <div class="fields">
      <label>
        Svenska
        <textarea id="sv" placeholder="Skriv på svenska..."></textarea>
      </label>

      <label>
        Engelska
        <textarea id="en" placeholder="Write in English..."></textarea>
      </label>

      <label>
        Persiska
        <textarea id="fa" placeholder="به فارسی بنویسید..."></textarea>
      </label>
    </div>

    <p id="status"></p>

    <script src="/app.js"></script>
  </body>
</html>
